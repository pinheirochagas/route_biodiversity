<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route to Biodiversity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-white text-gray-900 antialiased">

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div>
        <h1 class="text-sm font-semibold tracking-tight">Route to Biodiversity</h1>
      </div>
      <div id="auth-area" class="flex items-center gap-2">
        <a href="/auth/strava" id="btn-connect"
           class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-md bg-gray-900 text-white hover:bg-gray-700 transition-colors">
          Connect Strava
        </a>
        <div id="auth-connected" class="hidden items-center gap-2">
          <span class="text-[10px] text-gray-400">Connected</span>
          <button id="btn-logout"
                  class="text-[10px] text-gray-400 hover:text-gray-600 transition-colors underline underline-offset-2">
            Disconnect
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- App Shell: 3 panels -->
  <div class="app-shell">

    <!-- PANEL 1: Sidebar -->
    <aside class="sidebar" id="sidebar">
      <button id="mobile-sidebar-close" class="mobile-sidebar-close" type="button" onclick="document.getElementById('sidebar').classList.remove('mobile-expanded');document.querySelector('.mobile-fetch-toggle').classList.remove('open');var bd=document.querySelector('.mobile-sidebar-backdrop');if(bd)bd.remove();">&times; Close</button>
      <div class="sidebar-scroll">

        <!-- Route Input -->
        <div class="sidebar-section">
          <div class="sidebar-label">Route</div>
          <div class="flex gap-1 mb-2 bg-gray-50 rounded-md p-0.5">
            <button data-tab="strava" class="tab-btn active flex-1 px-2 py-1.5 text-[11px] font-medium rounded transition-colors">
              Strava
            </button>
            <button data-tab="gpx" class="tab-btn flex-1 px-2 py-1.5 text-[11px] font-medium rounded transition-colors">
              GPX
            </button>
          </div>

          <div id="tab-strava" class="tab-panel">
            <div class="flex gap-1.5 mb-2">
              <input type="text" id="activity-url" placeholder="Strava URL..."
                     class="flex-1 min-w-0 px-2 py-1.5 text-xs border border-gray-200 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-900 placeholder-gray-300">
              <button id="btn-fetch"
                      class="px-2.5 py-1.5 text-xs font-medium rounded-md bg-gray-900 text-white hover:bg-gray-700 transition-colors disabled:opacity-40 whitespace-nowrap">
                Go
              </button>
            </div>
            <div id="recent-activities" class="hidden">
              <div class="flex items-baseline justify-between" style="margin-bottom:4px">
                <div class="sidebar-label" style="margin-bottom:0">Activities <span class="text-[9px] text-gray-300 font-normal">(6 mo)</span></div>
                <a href="https://www.strava.com/athlete/training" target="_blank" class="text-[9px] text-gray-400 hover:text-gray-600 transition-colors">
                  All on Strava &rarr;
                </a>
              </div>
              <input type="text" id="activity-search" placeholder="Search activities..."
                     class="w-full px-2 py-1.5 mb-1.5 text-xs border border-gray-200 rounded-md focus:outline-none focus:ring-1 focus:ring-gray-900 placeholder-gray-300">
              <div id="activities-list" class="space-y-0"></div>
            </div>
          </div>

          <div id="tab-gpx" class="tab-panel hidden">
            <label class="relative flex items-center justify-center w-full h-16 border border-dashed border-gray-200 rounded-lg cursor-pointer hover:border-gray-300 transition-colors">
              <p class="text-[11px] text-gray-400">Drop GPX or <span class="text-gray-700 underline">browse</span></p>
              <input type="file" id="gpx-file" accept=".gpx" class="absolute inset-0 opacity-0 cursor-pointer">
            </label>
          </div>
        </div>

        <!-- Route Info (shown after load) -->
        <div id="route-info" class="sidebar-section hidden">
          <div class="sidebar-label">Loaded Route</div>
          <div class="flex items-baseline gap-1.5">
            <span id="route-name" class="text-xs font-medium text-gray-800 truncate"></span>
            <span id="route-country" class="text-[10px] text-gray-400"></span>
          </div>
          <div id="territories" class="mt-1"></div>
        </div>

        <!-- Taxa filters (shown after load) — desktop only -->
        <div id="taxa-section" class="sidebar-section hidden">
          <div class="sidebar-label">Taxa</div>
          <div id="taxa-filters" class="space-y-0.5"></div>
        </div>

        <!-- Footer -->
        <div class="sidebar-footer">
          <p class="text-[9px] text-gray-300 leading-relaxed">
            <a href="https://www.inaturalist.org" target="_blank" class="underline">iNaturalist</a> &middot;
            <a href="https://native-land.ca" target="_blank" class="underline">Native Land</a> &middot;
            <a href="https://github.com/pinheirochagas/route_biodiversity" target="_blank" class="underline">GitHub</a>
          </p>
        </div>
      </div>
    </aside>

    <!-- PANEL 2: Species Center -->
    <main class="panel-center" id="panel-center">

      <!-- Route info bar -->
      <div id="route-info-bar" class="route-info-bar hidden">
        <span id="route-name-top" class="text-xs font-medium text-gray-700"></span>
        <span id="route-country-top" class="text-[10px] text-gray-400"></span>
        <span class="text-[10px] text-gray-300">&middot;</span>
        <span id="territories-top" class="text-[10px] text-gray-400"></span>
      </div>

      <!-- Filters bar -->
      <div id="filters-section" class="filters-bar hidden">
        <div class="filters-row">
          <button id="mobile-fetch-toggle" class="mobile-fetch-toggle" type="button">
            Fetch route <span class="mobile-fetch-arrow">&#9662;</span>
          </button>
          <select id="month-select" class="filter-select">
            <option value="0">Year-round</option>
            <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
            <option value="4">Apr</option><option value="5">May</option><option value="6">Jun</option>
            <option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option>
            <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
          </select>
          <select id="show-select" class="filter-select">
            <option value="all">All species</option>
            <option value="top10">Top 10</option>
            <option value="top25">Top 25</option>
          </select>
          <select id="sort-select" class="filter-select">
            <option value="observations">Most observed</option>
            <option value="name">A &rarr; Z</option>
          </select>
        </div>
        <div id="mobile-taxa-row" class="mobile-taxa-row"></div>
      </div>

      <!-- Loading -->
      <div id="loading" class="hidden panel-message">
        <svg class="animate-spin h-4 w-4 text-gray-300" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" class="opacity-25"></circle>
          <path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="opacity-75"></path>
        </svg>
        <span id="loading-text" class="text-xs text-gray-400">Fetching route data...</span>
      </div>

      <!-- Error -->
      <div id="error" class="hidden mx-4 mt-4 p-3 rounded-lg bg-red-50 border border-red-100">
        <p id="error-text" class="text-xs text-red-600"></p>
      </div>

      <!-- Species Loading -->
      <div id="species-loading" class="hidden panel-message">
        <svg class="animate-spin h-4 w-4 text-gray-300" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" class="opacity-25"></circle>
          <path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="3" stroke-linecap="round" class="opacity-75"></path>
        </svg>
        <span class="text-xs text-gray-400">Querying iNaturalist...</span>
      </div>

      <!-- Species Grid -->
      <div id="species-container" class="species-grid-container"></div>

      <!-- Empty state -->
      <div id="empty-state" class="panel-message">
        <div class="text-center">
          <p class="text-sm text-gray-300 mb-1">No route loaded</p>
          <p class="text-xs text-gray-300">Connect Strava or upload a GPX file to explore biodiversity.</p>
        </div>
      </div>
    </main>

    <!-- PANEL 3: Map -->
    <div class="panel-map" id="panel-map">
      <div id="map" class="w-full h-full"></div>
    </div>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
